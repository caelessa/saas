<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{{url_for('static',filename='style.css')}}"><title>Criar conta</title></head><body class="login-page"><form method="post" class="login-card"><h1>Comece no Frota Fácil</h1><p>Crie sua locadora com uma base de dados exclusiva e limpa.</p>{% for cat,msg in get_flashed_messages(with_categories=true) %}<div class="flash {{cat}}">{{msg}}</div>{% endfor %}<label>Seu nome<input name="nome" required></label><label>Nome da locadora<input name="empresa" required></label><label>E-mail<input type="email" name="email" required></label><label>Senha<input type="password" name="senha" minlength="6" required></label><button>Criar conta</button><div class="auth-link">Já possui conta? <a href="{{url_for('entrar')}}">Entrar</a></div></form></body></html>
